{% extends "base.html" %}
{% block title %}Edit {{ device.display_name }} — {{ shop_name }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('devices.view', device_id=device.id) }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <h4 class="mb-0">Edit Device</h4>
    <small class="text-muted">{{ device.display_name }} · {{ customer.full_name }}</small>
  </div>
</div>

<div class="card border-0 shadow-sm" style="max-width: 700px;">
  <div class="card-body">
    <form method="post" action="{{ url_for('devices.edit', device_id=device.id) }}">
      {% include "devices/_form.html" %}
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Update Device
        </button>
        <a href="{{ url_for('devices.view', device_id=device.id) }}" class="btn btn-light ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
