{% extends "base.html" %}
{% block title %}Add Device — {{ customer.full_name }} — {{ shop_name }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('customers.view', customer_id=customer.id) }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <h4 class="mb-0">Add Device</h4>
    <small class="text-muted">for {{ customer.full_name }}</small>
  </div>
</div>

<div class="card border-0 shadow-sm" style="max-width: 700px;">
  <div class="card-body">
    <form method="post" action="{{ url_for('devices.add', customer_id=customer.id) }}">
      {% include "devices/_form.html" %}
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Save Device
        </button>
        <a href="{{ url_for('customers.view', customer_id=customer.id) }}" class="btn btn-light ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
