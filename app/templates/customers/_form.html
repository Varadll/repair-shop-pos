{# Reusable customer form fields — included by add.html and edit.html #}
<div class="row g-3">
  <div class="col-md-6">
    <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="first_name" name="first_name"
           value="{{ form_data.get('first_name', '') }}" required maxlength="80"
           placeholder="e.g. Varad" pattern="[A-Za-zÀ-ÖØ-öø-ÿ' -]+"
           title="Letters, spaces, hyphens, and apostrophes only">
  </div>
  <div class="col-md-6">
    <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="last_name" name="last_name"
           value="{{ form_data.get('last_name', '') }}" required maxlength="80"
           placeholder="e.g. Smith" pattern="[A-Za-zÀ-ÖØ-öø-ÿ' -]+"
           title="Letters, spaces, hyphens, and apostrophes only">
  </div>
  <div class="col-md-6">
    <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
    <input type="tel" class="form-control" id="phone" name="phone"
           value="{{ form_data.get('phone', '') }}" required maxlength="30"
           placeholder="e.g. 089 863 5743">
    <div class="form-text">Irish mobile: 10 digits. International: +353 format accepted.</div>
  </div>
  <div class="col-md-6">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email"
           value="{{ form_data.get('email', '') }}" maxlength="120"
           placeholder="e.g. customer@email.com">
  </div>
  <div class="col-12">
    <label for="address" class="form-label">Address</label>
    <input type="text" class="form-control" id="address" name="address"
           value="{{ form_data.get('address', '') }}"
           placeholder="e.g. 12 Main Street, Cork">
  </div>
  <div class="col-12">
    <label for="notes" class="form-label">Notes</label>
    <textarea class="form-control" id="notes" name="notes" rows="3"
              placeholder="Internal notes about this customer…">{{ form_data.get('notes', '') }}</textarea>
  </div>
</div>
