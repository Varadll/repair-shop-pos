{% extends "base.html" %}
{% block title %}Add Customer — {{ shop_name }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('customers.index') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0">Add Customer</h4>
</div>

<div class="card border-0 shadow-sm" style="max-width: 700px;">
  <div class="card-body">
    <form method="post" action="{{ url_for('customers.add') }}">
      {% include "customers/_form.html" %}
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Save Customer
        </button>
        <a href="{{ url_for('customers.index') }}" class="btn btn-light ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
